moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - ur5_arm_controller

  ur5_arm_controller:
    type: FollowJointTrajectory
    joints:
      - robot_cutter_arm_shoulder_pan_joint
      - robot_cutter_arm_shoulder_lift_joint
      - robot_cutter_arm_elbow_joint
      - robot_cutter_arm_wrist_1_joint
      - robot_cutter_arm_wrist_2_joint
      - robot_cutter_arm_wrist_3_joint
    action_ns: follow_joint_trajectory
    default: true
